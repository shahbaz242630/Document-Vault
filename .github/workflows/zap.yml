name: OWASP ZAP

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "41 3 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.3.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start isolated API
        run: |
          npm run start:zap --workspace @vault/api > zap-api.log 2>&1 &
          echo $! > zap-api.pid
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8787/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat zap-api.log
          exit 1

      - name: Run OWASP ZAP baseline
        run: |
          mkdir -p zap-reports
          chmod a+rwx zap-reports
          cp .zap/rules.tsv zap-reports/zap-rules.tsv
          docker run --rm --network host \
            -v "${{ github.workspace }}/zap-reports:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy@sha256:461415b7526ca60af0ddc15389419d05df243aed1b665b64d3a8c3ebd67c6056 \
            zap-baseline.py \
            -t http://127.0.0.1:8787/health \
            -m 1 \
            -I \
            -c zap-rules.tsv \
            -J zap-report.json \
            -r zap-report.html \
            -w zap-report.md

      - name: Enforce high-risk alert threshold
        run: node scripts/zap-report-check.cjs zap-reports/zap-report.json

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: owasp-zap-report
          path: |
            zap-api.log
            zap-reports/
          if-no-files-found: error
          retention-days: 7

      - name: Stop isolated API
        if: always()
        run: |
          if [ -f zap-api.pid ]; then
            kill "$(cat zap-api.pid)" 2>/dev/null || true
          fi
