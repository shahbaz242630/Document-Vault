name: Security CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-security:
    name: App security gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.3.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Expo Doctor
        run: npm run doctor --workspace @vault/mobile

      - name: Unit tests
        run: npm test --workspaces --if-present

      - name: Coverage thresholds
        run: npm run test:coverage --workspaces --if-present

      - name: Upload coverage summaries
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-summaries
          path: |
            apps/mobile/coverage/coverage-summary.json
            services/api/coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 14

      - name: Static security guard
        run: npm run check:security

      - name: GitHub Actions security guard
        run: npm run check:github-actions-security

      - name: Mobile secret scan
        run: npm run check:mobile-secrets

      - name: Security guard tests
        run: node --test scripts/security-check.test.cjs scripts/mobile-secret-scan.test.cjs scripts/supabase-db-security-check.test.cjs scripts/github-actions-security-check.test.cjs scripts/phase1-dod-check.test.cjs scripts/zap-report-check.test.cjs

      - name: Production dependency audit for high or critical advisories
        run: npm audit --omit=dev --workspaces --audit-level=high

  supabase-live-security:
    name: Supabase live security gates
    runs-on: ubuntu-latest
    needs: app-security
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.3.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.106.0

      - name: Start local Supabase
        run: supabase start --workdir supabase

      - name: Apply local Supabase migrations
        run: |
          set -euo pipefail
          for migration in supabase/migrations/*.sql; do
            echo "Applying ${migration}"
            docker exec -i supabase_db_supabase \
              psql -v ON_ERROR_STOP=1 -U postgres -d postgres < "${migration}"
          done

      - name: Live database catalog security check
        run: npm run check:supabase-db-security

      - name: Live RLS attack test
        run: npm run check:supabase-rls

      - name: Stop local Supabase
        if: always()
        run: supabase stop --workdir supabase
