version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    reviewers:
      - "shahbaz242630"
    commit-message:
      prefix: "deps"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    reviewers:
      - "shahbaz242630"
    commit-message:
      prefix: "deps"
    groups:
      github-actions:
        patterns:
          - "*"
